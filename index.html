<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<title>Моделювання руху</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Моделювання руху матеріальної точки</h2>

<div class="controls">

<label>x0:</label>
<input type="number" id="x0" value="50"><br>

<label>y0:</label>
<input type="number" id="y0" value="50"><br>

<label>Кут:</label>
<input type="number" id="angle" value="45"><br>

<label>Початкова швидкість:</label>
<input type="number" id="v0" value="20"><br>

<label>Прискорення:</label>
<input type="number" id="a" value="5"><br>

<label>Колір траєкторії:</label>
<input type="color" id="color"><br><br>

<button onclick="startMotion()">Почати</button>
<button onclick="clearCanvas()">Очистити</button>
<button onclick="drawTrajectory()">Побудувати</button>

</div>

<div id="chart"></div>


<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="script_d3.js"></script>

</body>
</html>
